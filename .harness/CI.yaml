pipeline:
    name: CI
    identifier: CI
    allowStageExecutions: false
    projectIdentifier: Scala
    orgIdentifier: default
    tags: {}
    properties:
        ci:
            codebase:
                connectorRef: org.Github
                repoName: geotrellis
                build: <+input>
    stages:
        - stage:
              name: Build and Test
              identifier: Build_and_Test
              type: CI
              spec:
                  cloneCodebase: true
                  infrastructure:
                      type: KubernetesDirect
                      spec:
                          connectorRef: org.GKE
                          namespace: harness-builds
                          automountServiceAccountToken: false
                  serviceDependencies:
                      - identifier: nginx
                        name: nginx
                        type: Service
                        spec:
                            connectorRef: org.Dockerhub
                            image: nginx:1.18.0
                            entrypoint:
                                - /bin/bash
                                - -c
                                - "\"cd /usr/share/nginx/html && curl -o all-ones.tif https://raw.githubusercontent.com/locationtech/geotrellis/v3.3.0/spark/src/test/resources/all-ones.tif && cd ~- && sed -i 's/listen       80;/listen       8081;/g' /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'\""
                      - identifier: minio
                        name: minio
                        type: Service
                        spec:
                            connectorRef: org.Dockerhub
                            image: minio/minio:RELEASE.2019-05-02T19-07-09Z
                            envVariables:
                                MINIO_ACCESS_KEY: minio
                                MINIO_SECRET_KEY: password
                            entrypoint:
                                - server
                                - --address
                                - :9091
                                - /data
                      - identifier: hbase
                        name: hbase
                        type: Service
                        spec:
                            connectorRef: org.Dockerhub
                            image: daunnc/hbase:2.2.4
                            envVariables:
                                HBASE_DOCKER_HOSTNAME: localhost
                      - identifier: cassandra
                        name: cassandra
                        type: Service
                        spec:
                            connectorRef: org.Dockerhub
                            image: cassandra:3.11.6
                            envVariables:
                                CASSANDRA_LISTEN_ADDRESS: 127.0.0.1
                  execution:
                      steps:
                          - step:
                                type: Run
                                name: Unzip Rasters
                                identifier: Unzip_Rasters
                                spec:
                                    connectorRef: org.Dockerhub
                                    image: bash:latest
                                    shell: Bash
                                    command: |-
                                        cd raster/data; 
                                        unzip geotiff-test-files.zip;
                          - step:
                                type: Run
                                name: Run Tests
                                identifier: Test
                                spec:
                                    connectorRef: org.Quayio
                                    image: quay.io/azavea/openjdk-gdal:3.1-jdk8-slim
                                    shell: Bash
                                    command: ./sbt ++ $SCALA_VERSION test
                                    reports:
                                        type: JUnit
                                        spec:
                                            paths:
                                                - "**/*.xml"
                                    envVariables:
                                        SCALA_VERSION: 2.13.7
                  sharedPaths:
                      - /data
                      - /usr/local/src
